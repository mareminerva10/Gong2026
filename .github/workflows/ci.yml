name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  guard:
    name: Claim-guard + hygiene tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so git ls-files runs against the real index.
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install --quiet pytest

      - name: Run guard suite
        run: pytest tests/ -v
